<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ML-KEM.NetCore.Browser Webpack Bundle Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 980px; }
    button { margin-right: 0.5rem; margin-bottom: 0.5rem; }
    pre { background: #f5f5f5; padding: 1rem; border-radius: 8px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>ML-KEM.NetCore.Browser Demo (Webpack Script Bundle)</h1>
  <p>
    This page uses the webpack output bundle from
    <code>dist/ML-KEM.NetCore.Browser.js</code> via <code>&lt;script src&gt;</code>.
  </p>

  <button id="gen">generateKeyPair()</button>
  <button id="enc">encapsulate(publicKey)</button>
  <button id="dec">decapsulate(secretKey, ciphertext)</button>
  <pre id="output">Ready.</pre>

  <script src="../dist/ML-KEM.NetCore.Browser.js"></script>
  <script>
    const { generateKeyPair, encapsulate, decapsulate } = window.MLKEMNetCoreBrowser;

    let keyPair;
    let encapsulated;

    const out = document.getElementById('output');
    const toHex = (bytes, max = 32) => Array.from(bytes.slice(0, max), (b) => b.toString(16).padStart(2, '0')).join('');
    const log = (msg) => { out.textContent = `${out.textContent}\n${msg}`; };

    document.getElementById('gen').onclick = async () => {
      try {
        keyPair = await generateKeyPair();
        encapsulated = undefined;
        log(`generateKeyPair -> ok (publicKey=${keyPair.publicKey.length} bytes, secretKey=${keyPair.secretKey.length} bytes)`);
      } catch (e) {
        log(`generateKeyPair -> ${e.message}`);
      }
    };

    document.getElementById('enc').onclick = async () => {
      try {
        if (!keyPair) {
          throw new Error('Generate a key pair first.');
        }

        encapsulated = await encapsulate(keyPair.publicKey);
        log(`encapsulate -> ok (ciphertext=${encapsulated.ciphertext.length} bytes, sharedSecret=${toHex(encapsulated.sharedSecret)}...)`);
      } catch (e) {
        log(`encapsulate -> ${e.message}`);
      }
    };

    document.getElementById('dec').onclick = async () => {
      try {
        if (!keyPair || !encapsulated) {
          throw new Error('Generate a key pair and encapsulate first.');
        }

        const decapsulated = await decapsulate(keyPair.secretKey, encapsulated.ciphertext);
        const matches = decapsulated.sharedSecret.every((value, index) => value === encapsulated.sharedSecret[index]);
        log(`decapsulate -> ok (sharedSecret=${toHex(decapsulated.sharedSecret)}..., match=${matches})`);
      } catch (e) {
        log(`decapsulate -> ${e.message}`);
      }
    };
  </script>
</body>
</html>
